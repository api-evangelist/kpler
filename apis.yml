- aid: kpler:kpler-liquids-api
  name: Kpler Liquids API
  tags:
  - Commodities
  - Crude Oil
  - Refined Products
  - Trade Flows
  - Supply Chain
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
