- aid: kpler:marinetraffic-api
  name: MarineTraffic API
  tags:
  - Vessel Tracking
  - AIS
  - Maritime
  - Port Calls
  - Voyages
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://servicedocs.marinetraffic.com/
  baseURL: https://services.marinetraffic.com/api
  properties:
  - url: https://servicedocs.marinetraffic.com/
    type: Documentation
  - url: https://www.kpler.com/product/maritime/data-services
    type: ProductPage
  description: MarineTraffic data services API (property of Kpler) for real-time
    and historical vessel tracking - current vessel positions and fleet positions,
    historical vessel tracks, port calls and berth calls, expected arrivals, voyage
    forecasts and ETAs, port congestion, vessel particulars and photos, vessel
    search, and reverse geocoding. Authenticated with an api_key issued per
    service and metered with a credit-based system.
- aid: kpler:marinetraffic-vessels-api
  name: MarineTraffic Vessels API
  tags:
  - Vessel Particulars
  - Ownership
  - Maritime
  - Due Diligence
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.kpler.com/product/maritime/vessels-api
  baseURL: https://services.marinetraffic.com/api
  properties:
  - url: https://www.kpler.com/product/maritime/vessels-api
    type: ProductPage
  description: GraphQL API for vessel intelligence on 220,000+ vessels - technical
    particulars, dimensions, and capacity plus six levels of ownership (beneficial
    owner, registered owner, commercial manager, operator, technical manager, ISM
    manager) and associated companies for maritime due diligence, risk, and
    compliance. Contact-sales product; reference documentation is delivered to
    customers.
- aid: kpler:kpler-ais-data-feed
  name: Kpler AIS Data Feed
  tags:
  - AIS
  - Vessel Tracking
  - Maritime
  - Streaming
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.kpler.com/product/maritime/kplerais
  baseURL: https://api.kpler.com
  properties:
  - url: https://www.kpler.com/product/maritime/kplerais
    type: ProductPage
  - url: https://servicedocs-sm.kpler.com/
    type: Documentation
  description: Global vessel-position data feed launched September 2025 (replacing
    MarineTraffic AIS and the acquired Spire Maritime feeds) combining terrestrial,
    satellite, and roaming AIS from a 9,000+ station network tracking 350,000+
    vessels daily at roughly 5-second latency. Delivered via API, NMEA (TCP),
    Kafka, or custom extracts under an enterprise contract - no public WebSocket.
