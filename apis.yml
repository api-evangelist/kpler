aid: kpler
url: https://raw.githubusercontent.com/api-evangelist/kpler/refs/heads/main/apis.yml
name: Kpler
kind: company
description: Kpler is a commodities intelligence and maritime data platform that
  tracks cargoes, vessels, and trade flows across oil, refined products, LNG, LPG,
  and dry bulk markets. Kpler owns MarineTraffic and FleetMon (acquired 2023) and
  acquired Spire's maritime AIS business (2025), giving it one of the largest
  terrestrial and satellite AIS vessel tracking networks in the world. Its Direct
  Access REST APIs deliver trades, flows, vessels, port calls, freight metrics,
  and inventories per commodity platform, while MarineTraffic APIs deliver live
  vessel positions, port calls, voyages, and vessel particulars. API access is
  customer-gated behind an enterprise subscription, but the documentation, Python
  SDK, and endpoint surface are publicly published.
