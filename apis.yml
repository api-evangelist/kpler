    type: OpenAPI
  description: Direct Access REST API for the Kpler Liquids platform covering crude
    oil, clean petroleum products (CPP), and dirty petroleum products (DPP).
    Endpoints deliver trades, flows, vessels, port calls, ship-to-ship transfers,
    storage/inventories, contracts, prices, and outages. Requires Kpler client
    credentials (Basic Auth or bearer token via /login).
