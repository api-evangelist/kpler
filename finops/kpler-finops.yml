description: >-
  FinOps view of Kpler spend. Kpler is sold as enterprise data subscriptions -
  annual contracts per commodity platform (Liquids, LNG, LPG, Dry) that bundle
  terminal seats with Direct Access API credentials, plus maritime/AIS data
  contracts (Kpler AIS, MarineTraffic services) sized by coverage and delivery
  channel. There is no self-serve or published per-call pricing; the primary
  cost object is the negotiated contract, with MarineTraffic API services
  additionally metered against purchased credit balances per API key.
notes: >-
  No public rates exist to reconcile. Track contract value against actual
  extraction volume and credit burn; the once-per-hour polling guidance means
  API call volume is naturally bounded, so cost optimization is mostly about
  platform scope (which commodities, which maritime feeds) rather than call
  reduction.
