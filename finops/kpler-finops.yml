meters:
- name: platform_subscription
  description: Annual subscription per commodity platform (Liquids, LNG, LPG, Dry) bundling terminal seats and API access.
  unit: contracts
  aggregation: sum
  dimensions:
  - platform
  - business_unit
- name: maritime_data_contract
  description: Kpler AIS / MarineTraffic maritime data agreements sized by fleet coverage and delivery channel (API, NMEA, Kafka, extract).
  unit: contracts
  aggregation: sum
  dimensions:
  - feed
  - delivery_channel
- name: marinetraffic_credits
  description: Credits consumed by MarineTraffic API service calls, drawn from purchased credit balances per API key.
  unit: credits
  aggregation: sum
  dimensions:
  - api_key
  - service
- name: api_extractions
  description: Direct Access API queries executed (trades, flows, vessels, and related endpoints), useful for mapping contract value to actual usage.
  unit: requests
  aggregation: sum
  dimensions:
  - platform
  - endpoint
principles:
- name: Visibility
  description: Inventory every Kpler and MarineTraffic contract, API key, and credit balance; monitor the Credits Balance endpoint programmatically.
- name: Allocation
  description: Map platform subscriptions and maritime feeds to the desks and teams consuming them (trading, freight, compliance, supply chain).
- name: Optimization
  description: Right-size platform scope at renewal against actual endpoint usage; consolidate overlapping vessel-tracking sources (legacy MarineTraffic, Spire, FleetMon contracts) onto the unified Kpler feeds.
- name: Accountability
  description: Assign an owner per contract and per API key; review extraction volume and credit burn against contract value quarterly.
